name: Knit Rmd Files

on:
  push:
    branches: [main]
    paths:
      - '**/*.Rmd'
      - 'auto_Knit_online.txt'
  workflow_dispatch:

jobs:
  knit-rmd:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs libmagick++-dev libgeos-dev libgfortran5 liblapack-dev libblas-dev \
            libpng-dev libjpeg-dev librsvg2-dev libcairo2-dev libnode-dev libproj-dev \
            libxml2-dev libcurl4-openssl-dev libssl-dev libhdf5-dev libv8-dev \
            libfontconfig1-dev libharfbuzz-dev libfribidi-dev libgdal-dev gfortran \
            libfreetype6-dev libtiff5-dev libudunits2-dev
          git lfs install

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'latest'

      - name: Set up Java for rJava
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Configure R for Java
        run: sudo R CMD javareconf

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2
        with:
          pandoc-version: '3.8.2'

      - name: Install core R dependencies
        run: Rscript -e 'install.packages(c("rmarkdown", "remotes"), repos="https://cloud.r-project.org")'

      - name: Render Rmd files
        id: render_rmd
        run: |
          # Check if auto_Knit_online.txt exists
          if [ ! -f auto_Knit_online.txt ]; then
            echo "auto_Knit_online.txt not found. Creating default list..."
            # Find all Rmd files and extract folder names
            find . -name "*.Rmd" -type f | while read -r rmd_file; do
              dirname "$(dirname "$rmd_file")" | sed 's|^\./||' >> auto_Knit_online_default.txt
            done
            sort -u auto_Knit_online_default.txt | tee auto_Knit_online.txt
            rm -f auto_Knit_online_default.txt
          fi

          # Read the file list
          TO_KNIT=$(<auto_Knit_online.txt)
          echo "Rendering files listed in auto_Knit_online.txt: $TO_KNIT"

          # Process each pattern
          RENDER_SUMMARY=""
          ANY_FILE_FAILED=false

          for pattern in $TO_KNIT; do
            echo "========== Processing: $pattern =========="

            # Find matching Rmd files (folders containing the pattern)
            while IFS= read -r rmd_file; do
              rmd_dir=$(dirname "$rmd_file")
              rmd_basename=$(basename "$rmd_file")

              # Check if this folder should be rendered
              folder_name=$(echo "$rmd_dir" | sed 's|^\./||')
              if [[ ! "$folder_name" == *"$pattern"* ]]; then
                continue
              fi

              echo "--- Rendering: $rmd_file ---"

              # Install dependencies if install_dependencies.R exists
              if [ -f "$rmd_dir/install_dependencies.R" ]; then
                echo "Installing dependencies for $rmd_file..."
                (cd "$rmd_dir" && Rscript install_dependencies.R > install.log 2>&1 || echo "WARNING: Dependency installation had issues.")
              fi

              # Render the Rmd file
              if Rscript -e "rmarkdown::render('$rmd_file', quiet=TRUE)" > rmd_render.log 2>&1; then
                echo "[SUCCESS] - $rmd_file"
                RENDER_SUMMARY="${RENDER_SUMMARY}[SUCCESS] - $rmd_file"$'\n'
              else
                ANY_FILE_FAILED=true
                echo "[FAILED] - $rmd_file"
                RENDER_SUMMARY="${RENDER_SUMMARY}[FAILED] - $rmd_file"$'\n'
                echo "--- Error Log ---"
                tail -n 20 rmd_render.log
                echo "--------------"
              fi
            done < <(find . -type f -name "*.Rmd")

          done
          echo "job_failed=$ANY_FILE_FAILED" >> $GITHUB_OUTPUT

      - name: Generate file list for downloads
        run: |
          python .github/scripts/generate_file_list.py

      - name: Upload Render Summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-summary
          path: render_summary.txt
          retention-days: 7

      - name: Commit and Push Files
        if: always()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          echo "Adding generated files..."
          git add --all

          # Check for changes
          if ! git diff --staged --quiet; then
            git commit -m "Auto-render Rmd files [skip ci]"

            echo "Pushing to remote..."
            if ! git push origin main; then
              echo "Push failed, attempting force push..."
              git push origin main --force
            fi
          else
            echo "No new files to commit."
          fi

      - name: Report Status
        if: always()
        run: |
          if [ "${{ steps.render_rmd.outputs.job_failed }}" = "true" ]; then
            echo "::warning ::Some Rmd files failed to render. Check the 'render-summary' artifact."
          else
            echo "All Rmd files rendered successfully."
          fi