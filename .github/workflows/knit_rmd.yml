name: Knit Rmd Files

on:
  push:
    branches: [main]
    paths:
      - '**/*.Rmd'
      - 'auto_Knit_online.txt'
  workflow_dispatch:

jobs:
  knit-rmd:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmagick++-dev libpng-dev libjpeg-dev libfontconfig1-dev

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install R packages
        run: Rscript -e 'install.packages(c("rmarkdown", "sessioninfo"), repos="https://cloud.r-project.org")'

      - name: Render Rmd files
        id: render
        run: |
          echo "=== Step 1: Read auto_Knit_online.txt ==="
          cat auto_Knit_online.txt

          TO_KNIT=$(cat auto_Knit_online.txt)
          echo ""
          echo "=== Step 2: Folders to process ==="
          echo "$TO_KNIT"

          echo ""
          echo "=== Step 3: List all directories ==="
          ls -la

          RENDERED=0
          FAILED=0

          for pattern in $TO_KNIT; do
            echo ""
            echo "=== Processing: $pattern ==="

            # Check if folder exists
            if [ ! -d "$pattern" ]; then
              echo "Folder NOT found: $pattern"
              continue
            fi

            # Find Rmd files in this folder
            for rmd in "$pattern"/*.Rmd; do
              if [ ! -f "$rmd" ]; then
                echo "No Rmd files in: $pattern"
                continue
              fi

              echo "Rendering: $rmd"
              html="${rmd%.Rmd}.html"

              if Rscript -e "rmarkdown::render('$rmd', output_file='$html')" 2>&1; then
                echo "SUCCESS: $rmd -> $html"
                RENDERED=$((RENDERED + 1))
              else
                echo "FAILED: $rmd"
                FAILED=$((FAILED + 1))
              fi
            done
          done

          echo ""
          echo "=== Summary ==="
          echo "Rendered: $RENDERED"
          echo "Failed: $FAILED"
          echo "rendered=$RENDERED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT

      - name: Commit and push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "Auto-render Rmd files"
            git push origin main || git push origin main --force
          else
            echo "No files to commit"
          fi

      - name: Report status
        if: always()
        run: |
          echo "Done! Rendered: ${{ steps.render.outputs.rendered }}, Failed: ${{ steps.render.outputs.failed }}"