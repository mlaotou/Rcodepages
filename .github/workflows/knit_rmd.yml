name: Knit Rmd Files

on:
  push:
    branches: [main]
    paths:
      - '**/*.Rmd'
      - 'auto_Knit_online.txt'
  workflow_dispatch:

jobs:
  knit-rmd:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmagick++-dev libpng-dev libjpeg-dev libfontconfig1-dev

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install R packages
        run: Rscript -e 'install.packages(c("rmarkdown", "sessioninfo"), repos="https://cloud.r-project.org")'

      - name: Render Rmd files
        id: render
        run: |
          TO_KNIT=$(cat auto_Knit_online.txt)
          echo "Processing: $TO_KNIT"

          RENDERED=0
          FAILED=0

          for pattern in $TO_KNIT; do
            echo "=== $pattern ==="

            # Find Rmd files in matching folders
            for rmd in */"$pattern"/*.Rmd; do
              [ -f "$rmd" ] || continue

              folder=$(dirname "$rmd")
              echo "Rendering: $rmd"

              # Render to HTML
              html="${rmd%.Rmd}.html"
              if Rscript -e "rmarkdown::render('$rmd', output_file='$html')"; then
                echo "OK: $rmd -> $html"
                RENDERED=$((RENDERED + 1))
              else
                echo "FAIL: $rmd"
                FAILED=$((FAILED + 1))
              fi
            done
          done

          echo "Rendered: $RENDERED, Failed: $FAILED"
          echo "rendered=$RENDERED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT

      - name: Commit and push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "Auto-render Rmd files"
            git push origin main || git push origin main --force
          fi

      - name: Report
        if: always()
        run: |
          echo "Rendered: ${{ steps.render.outputs.rendered }}"
          echo "Failed: ${{ steps.render.outputs.failed }}"